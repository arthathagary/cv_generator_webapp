<!DOCTYPE html>
<html>
<head>
    <title>Extension Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Extension Connection Debug Test</h1>
    
    <div>
        <button onclick="testExtensionConnection()">Test Extension Connection</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>
    
    <div id="log"></div>
    
    <script>
        let logCount = 0;
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log ${type}`;
            entry.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
            console.log(message);
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
            logCount = 0;
        }
        
        function testExtensionConnection() {
            log('🔧 Starting extension connection test...');
            
            // Get extension ID from URL params
            const urlParams = new URLSearchParams(window.location.search);
            const extensionId = urlParams.get('extensionId');
            
            if (!extensionId) {
                log('❌ No extension ID provided in URL params', 'error');
                return;
            }
            
            log(`📱 Extension ID: ${extensionId}`);
            
            // Check if Chrome extension APIs are available
            if (!window.chrome || !window.chrome.runtime) {
                log('❌ Chrome extension APIs not available', 'error');
                return;
            }
            
            log('✅ Chrome extension APIs are available');
            
            // Test connection data
            const testConnectionData = {
                type: 'EXTENSION_CONNECTED',
                accessToken: 'test-token-123',
                userId: 'test-user-456',
                profile: {
                    name: 'Sarah Johnson',
                    email: 'sarah.johnson@test.com',
                    hasProfile: true
                },
                apiUrl: window.location.origin,
                timestamp: Date.now()
            };
            
            log('📤 Sending test connection data:');
            log(JSON.stringify(testConnectionData, null, 2));
            
            try {
                // Method 1: Try using port connection (current method)
                log('🔌 Attempting port connection...');
                const port = window.chrome.runtime.connect(extensionId, { name: 'auth' });
                
                port.onMessage.addListener((response) => {
                    log(`✅ Port response received: ${JSON.stringify(response)}`, 'success');
                });
                
                port.onDisconnect.addListener(() => {
                    const lastError = window.chrome.runtime.lastError;
                    if (lastError) {
                        log(`❌ Port disconnected with error: ${lastError.message}`, 'error');
                    } else {
                        log('✅ Port disconnected normally', 'success');
                    }
                });
                
                // Send the message
                port.postMessage(testConnectionData);
                log('📤 Message sent via port');
                
                // Also try direct message method
                setTimeout(() => {
                    log('🔌 Attempting direct message...');
                    window.chrome.runtime.sendMessage(extensionId, testConnectionData, (response) => {
                        if (window.chrome.runtime.lastError) {
                            log(`❌ Direct message error: ${window.chrome.runtime.lastError.message}`, 'error');
                        } else {
                            log(`✅ Direct message response: ${JSON.stringify(response)}`, 'success');
                        }
                    });
                }, 1000);
                
            } catch (error) {
                log(`❌ Connection failed: ${error.message}`, 'error');
            }
        }
        
        // Auto-run test if extension ID is provided
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('extensionId')) {
                log('🚀 Auto-starting connection test...');
                setTimeout(testExtensionConnection, 1000);
            }
        });
    </script>
</body>
</html>
